name: Build EXE
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install pyinstaller pynput schedule pywin32 pywin32-ctypes
      - run: >
          pyinstaller --onefile --windowed --name UO Macro Helper
          --hidden-import win32gui --hidden-import win32con
          --hidden-import win32api --hidden-import win32process
          --hidden-import pywintypes
          --hidden-import pynput.keyboard._win32
          --hidden-import pynput.mouse._win32
          --hidden-import pynput._util.win32
          --collect-all pynput
          macro_recorder.py
      - uses: actions/upload-artifact@v4
        with:
          name: UO Macro Helper.exe
          path: dist/UO Macro Helper.exe
          if-no-files-found: error
